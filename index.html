<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0d0d1a;
      --card: #1a1a2e;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --correct: #22c55e;
      --wrong: #ef4444;
      --skip: #f59e0b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #2d2d4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.1) 0%, transparent 50%);
    }

    /* ── PANTALLA INICIO ── */
    #start-screen {
      text-align: center;
      max-width: 600px;
      animation: fadeIn .6s ease;
    }
    #start-screen .logo {
      font-size: 4rem;
      margin-bottom: 10px;
    }
    #start-screen h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    #start-screen p {
      color: var(--muted);
      margin-bottom: 30px;
      font-size: 1rem;
    }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-start:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 30px rgba(124,58,237,0.6);
    }

    /* ── BARRA PROGRESO ── */
    #progress-bar-wrap {
      width: 100%;
      max-width: 700px;
      margin-bottom: 18px;
      display: none;
    }
    #progress-info {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    #progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      transition: width .4s ease;
      width: 0%;
    }

    /* ── TARJETA PREGUNTA ── */
    #quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 40px;
      max-width: 700px;
      width: 100%;
      display: none;
      animation: slideUp .4s ease;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .q-type-badge {
      display: inline-block;
      background: rgba(124,58,237,0.2);
      color: var(--accent2);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }
    #question-text {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ── OPCIONES MÚLTIPLE ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .opt-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: .95rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .opt-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity .2s;
    }
    .opt-btn span { position: relative; z-index: 1; }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }
    .opt-btn:hover:not(:disabled)::before { opacity: .12; }
    .opt-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.15); }
    .opt-btn.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.15); }
    .opt-btn:disabled { cursor: default; }

    /* ── VERDADERO / FALSO ── */
    .tf-grid {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .tf-btn {
      flex: 1;
      padding: 20px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .tf-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(124,58,237,0.3);
      border-color: var(--accent2);
    }
    .tf-btn.true-btn:hover:not(:disabled)  { background: rgba(34,197,94,0.15);  border-color: var(--correct); }
    .tf-btn.false-btn:hover:not(:disabled) { background: rgba(239,68,68,0.15);  border-color: var(--wrong); }
    .tf-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.2); }
    .tf-btn.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.2); }
    .tf-btn:disabled { cursor: default; }

    /* ── UNIR ── */
    .match-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .match-col { display: flex; flex-direction: column; gap: 10px; }
    .match-col h4 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .match-item {
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
      user-select: none;
    }
    .match-item:hover { border-color: var(--accent2); background: rgba(124,58,237,0.1); }
    .match-item.selected { border-color: var(--accent2); background: rgba(124,58,237,0.2); }
    .match-item.matched-correct { border-color: var(--correct); background: rgba(34,197,94,0.15); cursor: default; }
    .match-item.matched-wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.15); cursor: default; }
    .match-item:disabled, .match-item.disabled { cursor: default; pointer-events: none; }

    /* ── FEEDBACK ── */
    #feedback-box {
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: .95rem;
      font-weight: 600;
      display: none;
      animation: fadeIn .3s ease;
    }
    #feedback-box.correct { background: rgba(34,197,94,0.15); border: 1px solid var(--correct); color: var(--correct); }
    #feedback-box.wrong   { background: rgba(239,68,68,0.15);  border: 1px solid var(--wrong);  color: var(--wrong); }
    #feedback-box.skip    { background: rgba(245,158,11,0.15); border: 1px solid var(--skip);   color: var(--skip); }

    /* ── BOTONES ACCIÓN ── */
    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-action {
      flex: 1;
      min-width: 120px;
      padding: 13px 20px;
      border-radius: 50px;
      border: none;
      font-size: .95rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, opacity .2s;
    }
    .btn-action:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .btn-action:disabled { opacity: .4; cursor: default; }
    .btn-skip    { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #1a1a2e; }
    .btn-dontknow{ background: linear-gradient(135deg, #ef4444, #f87171); color: #fff; }
    .btn-next    { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-next:disabled { opacity: .35; cursor: default; transform: none !important; box-shadow: none !important; }
    .btn-music   {
      position: fixed; top: 18px; right: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-music:hover { background: rgba(124,58,237,0.3); border-color: var(--accent2); }

    /* ── MENÚ MÚSICA ── */
    #music-menu {
      position: fixed;
      top: 72px;
      right: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 100;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      min-width: 160px;
      animation: fadeIn .15s ease;
    }
    #music-menu.open { display: flex; }
    .music-opt {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .music-opt:hover { background: rgba(124,58,237,0.2); }
    .music-opt.playing { color: var(--accent2); font-weight: 600; }
    .music-opt .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .music-opt.playing .dot { background: var(--accent2); }

    /* ── PANTALLA RESULTADOS ── */
    #result-screen {
      text-align: center;
      max-width: 640px;
      width: 100%;
      display: none;
      animation: fadeIn .6s ease;
    }
    .result-emoji { font-size: 5rem; margin-bottom: 10px; }
    #result-title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    #result-score {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--accent2);
      margin-bottom: 6px;
    }
    #result-message {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 24px;
      min-width: 110px;
    }
    .stat-box .stat-num { font-size: 1.8rem; font-weight: 800; }
    .stat-box .stat-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat-correct .stat-num { color: var(--correct); }
    .stat-wrong   .stat-num { color: var(--wrong); }
    .stat-skip    .stat-num { color: var(--skip); }
    .btn-restart {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(124,58,237,0.6); }

    /* ── ANIMACIONES ── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .options-grid { grid-template-columns: 1fr; }
      .match-container { grid-template-columns: 1fr; }
      #quiz-card { padding: 24px 20px; }
      #question-text { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<!-- Audios -->
<audio id="audio-vito"     src="cancion.mp3"  loop></audio>
<audio id="audio-girasoles" src="cancion2.mp3" loop></audio>

    <span class="dot"></span> Justin
  </button>
</div>

<!-- ══ PANTALLA INICIO ══ -->
<div id="start-screen">
  <div class="logo">🧠</div>
  <h1>Quiz: Drogas y Adicciones</h1>
  <p>20 preguntas · Pon a prueba tus conocimientos<br>sobre sustancias y sus efectos</p>
  <button class="btn-start" onclick="startQuiz()">Comenzar Quiz</button>
</div>

<!-- ══ BARRA PROGRESO ══ -->
<div id="progress-bar-wrap">
  <div id="progress-info">
    <span id="q-counter">Pregunta 1 de 20</span>
    <span id="score-live">✅ 0 &nbsp; ❌ 0 &nbsp; ⏭ 0</span>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- ══ TARJETA PREGUNTA ══ -->
<div id="quiz-card">
  <div class="q-type-badge" id="q-type-badge">Pregunta</div>
  <div id="question-text"></div>
  <div id="answer-area"></div>
  <div id="feedback-box"></div>
  <div class="action-row">
    <button class="btn-action btn-skip"     id="btn-skip"     onclick="skipQuestion()">⏭ Skip</button>
    <button class="btn-action btn-dontknow" id="btn-dontknow" onclick="dontKnow()">❓ No sé</button>
    <button class="btn-action btn-next"     id="btn-next"     onclick="nextQuestion()" disabled>Siguiente pregunta →</button>
  </div>
</div>

<!-- ══ PANTALLA RESULTADOS ══ -->

  <div class="result-stats">

    <div class="stat-box stat-wrong">  <div class="stat-num" id="stat-w">0</div><div class="stat-label">Incorrectas</div></div>
    <div class="stat-box stat-skip">   <div class="stat-num" id="stat-s">0</div><div class="stat-label">Saltadas</div></div>

  <button class="btn-restart" onclick="restartQuiz()">🔄 Jugar de nuevo</button>

// ══════════════════════════════════════════════
//  AUDIO (Web Audio API — sin archivos externos)
// ══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + .1);
      osc.frequency.setValueAtTime(784, now + .2);
      gain.gain.setValueAtTime(.3, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + .5);
      osc.start(now); osc.stop(now + .5);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.setValueAtTime(150, now + .15);
      gain.gain.setValueAtTime(.25, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + .4);
      osc.start(now); osc.stop(now + .4);
    } else if (type === 'skip') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(330, now + .1);
      gain.gain.setValueAtTime(.2, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + .3);
      osc.start(now); osc.stop(now + .3);
    } else if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(.15, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + .1);
      osc.start(now); osc.stop(now + .1);
    } else if (type === 'finish') {
      [523,659,784,1047].forEach((f,i) => {
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'sine'; o2.frequency.value = f;
        g2.gain.setValueAtTime(.25, now + i*.12);
        g2.gain.exponentialRampToValueAtTime(.001, now + i*.12 + .4);
        o2.start(now + i*.12); o2.stop(now + i*.12 + .4);
      });
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
//  MÚSICA — selector de canciones
// ══════════════════════════════════════════════
const TRACKS = {
  vito:      document.getElementById('audio-vito'),
  girasoles: document.getElementById('audio-girasoles'),
  justin:    document.getElementById('audio-justin'),
};
Object.values(TRACKS).forEach(a => a.volume = 0.5);

let currentTrack = null;
const musicMenu  = document.getElementById('music-menu');
const musicBtn   = document.getElementById('music-btn');

// Abrir/cerrar menú al pulsar el botón
musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  musicMenu.classList.toggle('open');
});

// Cerrar menú al hacer clic fuera
document.addEventListener('click', () => musicMenu.classList.remove('open'));

function selectTrack(name) {
  musicMenu.classList.remove('open');

  // Si ya estaba sonando la misma, pausar
  if (currentTrack === name && !TRACKS[name].paused) {
    TRACKS[name].pause();
    musicBtn.textContent = '🔇';
    updateDots();
    return;
  }

  // Parar todas las demás
  Object.entries(TRACKS).forEach(([k, audio]) => {
    if (k !== name) { audio.pause(); audio.currentTime = 0; }
  });

  // Reproducir la seleccionada
  currentTrack = name;
  TRACKS[name].play().catch(() => {});
  musicBtn.textContent = '🎵';
  updateDots();
}

function updateDots() {
  Object.keys(TRACKS).forEach(name => {
    const btn = document.getElementById('opt-' + name);
    if (currentTrack === name && !TRACKS[name].paused) {
      btn.classList.add('playing');
    } else {
      btn.classList.remove('playing');
    }
  });
}

// ══════════════════════════════════════════════
//  ESTADO DEL QUIZ
// ══════════════════════════════════════════════
let questions = [];
let currentIndex = 0;
let skippedIndices = [];
let score = 0;
let wrongCount = 0;
let skipCount = 0;
let answered = false;
let matchState = {};

function startQuiz() {
  playSound('click');
  questions = [...ALL_QUESTIONS];
  currentIndex = 0; skippedIndices = []; score = 0; wrongCount = 0; skipCount = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('quiz-card').style.display = 'block';
  showQuestion();
}

function restartQuiz() {
  playSound('click');
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}

// ══════════════════════════════════════════════
//  MOSTRAR PREGUNTA
// ══════════════════════════════════════════════
function showQuestion() {
  answered = false;
  matchState = {};
  const q = questions[currentIndex];
  const total = ALL_QUESTIONS.length;
  const done  = currentIndex + 1;

  // Progreso
  document.getElementById('q-counter').textContent = `Pregunta ${done} de ${total}`;
  document.getElementById('score-live').innerHTML = `✅ ${score} &nbsp; ❌ ${wrongCount} &nbsp; ⏭ ${skipCount}`;
  document.getElementById('progress-fill').style.width = `${((done-1)/total)*100}%`;

  // Badge tipo
  const badges = { multiple:'Opción múltiple', truefalse:'Verdadero / Falso', match:'Unir' };
  document.getElementById('q-type-badge').textContent = badges[q.type] || 'Pregunta';

  // Texto
  document.getElementById('question-text').textContent = q.question;

  // Área respuesta
  const area = document.getElementById('answer-area');
  area.innerHTML = '';

  if (q.type === 'multiple') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span>${String.fromCharCode(65+i)}. ${opt}</span>`;
      btn.onclick = () => selectMultiple(i, q.correct, btn, grid);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else if (q.type === 'truefalse') {
    const tf = document.createElement('div');
    tf.className = 'tf-grid';
    ['Verdadero','Falso'].forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = `tf-btn ${i===0?'true-btn':'false-btn'}`;
      btn.textContent = (i===0 ? '✅ ' : '❌ ') + label;
      const val = i === 0;
      btn.onclick = () => selectTF(val, q.correct, btn, tf);
      tf.appendChild(btn);
    });
    area.appendChild(tf);
  } else if (q.type === 'match') {
    renderMatch(q, area);
  }

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none'; fb.className = 'feedback-box'; fb.textContent = '';

  // Botones
  document.getElementById('btn-skip').disabled = false;
  document.getElementById('btn-dontknow').disabled = false;
  document.getElementById('btn-next').disabled = true;

  // Animar tarjeta
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'slideUp .4s ease';
}

// ══════════════════════════════════════════════
//  LÓGICA RESPUESTAS
// ══════════════════════════════════════════════
function selectMultiple(chosen, correct, btn, grid) {
  if (answered) return;
  answered = true;
  const btns = grid.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    btn.classList.add('correct');
    showFeedback('correct', '✅ ¡Correcto!');
    score++;
    playSound('correct');
  } else {
    btn.classList.add('wrong');
    showFeedback('wrong', '❌ Incorrecto. La respuesta correcta está marcada en verde.');
    wrongCount++;
    playSound('wrong');
  }
  updateLive();
  showNextBtn();
}

function selectTF(chosen, correct, btn, container) {
  if (answered) return;
  answered = true;
  container.querySelectorAll('.tf-btn').forEach(b => b.disabled = true);
  if (chosen === correct) {
    btn.classList.add('correct');
    showFeedback('correct', '✅ ¡Correcto!');
    score++;
    playSound('correct');
  } else {
    btn.classList.add('wrong');
    const correctLabel = correct ? 'Verdadero' : 'Falso';
    showFeedback('wrong', `❌ Incorrecto. La respuesta correcta es: ${correctLabel}`);
    wrongCount++;
    playSound('wrong');
  }
  updateLive();
  showNextBtn();
}

// ── MATCH ──
function renderMatch(q, area) {
  const container = document.createElement('div');
  container.className = 'match-container';

  const leftCol  = document.createElement('div'); leftCol.className  = 'match-col';
  const rightCol = document.createElement('div'); rightCol.className = 'match-col';
  const lh = document.createElement('h4'); lh.textContent = 'Concepto';
  const rh = document.createElement('h4'); rh.textContent = 'Clasificación';
  leftCol.appendChild(lh); rightCol.appendChild(rh);

  // Mezclar columna derecha
  const shuffledRight = [...q.pairs].sort(() => Math.random() - .5);
  matchState = { selected: null, selectedSide: null, matched: 0, total: q.pairs.length, pairs: q.pairs };

  q.pairs.forEach((pair, i) => {
    const li = document.createElement('div');
    li.className = 'match-item'; li.textContent = pair.left;
    li.dataset.side = 'left'; li.dataset.idx = i;
    li.onclick = () => handleMatchClick(li, 'left', pair.left, q.pairs);
    leftCol.appendChild(li);
  });
  shuffledRight.forEach((pair, i) => {
    const ri = document.createElement('div');
    ri.className = 'match-item'; ri.textContent = pair.right;
    ri.dataset.side = 'right'; ri.dataset.value = pair.right;
    ri.onclick = () => handleMatchClick(ri, 'right', pair.right, q.pairs);
    rightCol.appendChild(ri);
  });

  container.appendChild(leftCol);
  container.appendChild(rightCol);
  area.appendChild(container);
}

function handleMatchClick(el, side, value, pairs) {
  if (answered) return;
  if (el.classList.contains('matched-correct') || el.classList.contains('matched-wrong') || el.classList.contains('disabled')) return;

  if (!matchState.selected) {
    // Primera selección
    document.querySelectorAll('.match-item.selected').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    matchState.selected = el;
    matchState.selectedSide = side;
    matchState.selectedValue = value;
    playSound('click');
  } else {
    // Segunda selección — debe ser lado contrario
    if (matchState.selectedSide === side) {
      document.querySelectorAll('.match-item.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      matchState.selected = el;
      matchState.selectedSide = side;
      matchState.selectedValue = value;
      return;
    }
    const leftEl  = side === 'left'  ? el : matchState.selected;
    const rightEl = side === 'right' ? el : matchState.selected;
    const leftVal  = leftEl.textContent;
    const rightVal = rightEl.textContent;

    // Buscar par correcto
    const correctPair = pairs.find(p => p.left === leftVal);
    const isCorrect = correctPair && correctPair.right === rightVal;

    leftEl.classList.remove('selected');
    rightEl.classList.remove('selected');
    leftEl.classList.add(isCorrect ? 'matched-correct' : 'matched-wrong');
    rightEl.classList.add(isCorrect ? 'matched-correct' : 'matched-wrong');
    leftEl.classList.add('disabled'); rightEl.classList.add('disabled');

    matchState.selected = null;
    matchState.selectedSide = null;
    matchState.matched++;

    if (isCorrect) playSound('correct'); else playSound('wrong');

    if (matchState.matched === matchState.total) {
      answered = true;
      const allCorrect = document.querySelectorAll('.match-item.matched-correct').length === matchState.total * 2;
      if (allCorrect) {
        showFeedback('correct', '✅ ¡Todas las parejas correctas!');
        score++;
      } else {
        showFeedback('wrong', '❌ Algunas parejas eran incorrectas.');
        wrongCount++;
      }
      updateLive();
      showNextBtn();
    }
  }
}

// ══════════════════════════════════════════════
//  SKIP / NO SÉ / SIGUIENTE
// ══════════════════════════════════════════════
function skipQuestion() {
  if (answered) return;
  playSound('skip');
  // Guardar índice actual para el final
  skippedIndices.push(currentIndex);
  skipCount++;
  showFeedback('skip', '⏭ Pregunta guardada para el final.');
  answered = true;
  updateLive();
  showNextBtn();
}

function dontKnow() {
  if (answered) return;
  playSound('wrong');
  wrongCount++;
  answered = true;
  showFeedback('wrong', '❌ Marcada como no sabida.');
  updateLive();
  showNextBtn();
}

function showNextBtn() {
  document.getElementById('btn-skip').disabled = true;
  document.getElementById('btn-dontknow').disabled = true;
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  playSound('click');
  currentIndex++;

  // Si llegamos al final de las preguntas normales, añadir las saltadas
  if (currentIndex >= questions.length) {
    if (skippedIndices.length > 0) {
      // Añadir preguntas saltadas al final (sin duplicar)
      const skipped = skippedIndices.map(i => ALL_QUESTIONS[i]);
      questions = [...ALL_QUESTIONS, ...skipped];
      skippedIndices = [];
    } else {
      showResults();
      return;
    }
  }

  if (currentIndex >= questions.length) {
    showResults();
    return;
  }

  showQuestion();
}

function updateLive() {
  document.getElementById('score-live').innerHTML = `✅ ${score} &nbsp; ❌ ${wrongCount} &nbsp; ⏭ ${skipCount}`;
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback-box');
  fb.className = `feedback-box ${type}`;
  // Aplicar id para estilos
  fb.id = 'feedback-box';
  fb.classList.add(type);
  fb.textContent = msg;
  fb.style.display = 'block';
}

// ══════════════════════════════════════════════
//  RESULTADOS
// ══════════════════════════════════════════════
function showResults() {
  playSound('finish');
  document.getElementById('progress-bar-wrap').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'none';

  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('result-score').textContent = `${score} / ${ALL_QUESTIONS.length}`;
  document.getElementById('stat-c').textContent = score;
  document.getElementById('stat-w').textContent = wrongCount;
  document.getElementById('stat-s').textContent = skipCount;

  let range;
  if      (score <= 5)  range = '0-5';
  else if (score <= 10) range = '6-10';
  else if (score <= 15) range = '11-15';
  else                  range = '16-20';

  const data = RESULT_MESSAGES[range];
  document.getElementById('result-emoji').textContent = data.emoji;
  document.getElementById('result-title').textContent = data.title;
  document.getElementById('result-message').textContent = data.msg;

  // Actualizar barra de progreso al 100%
  document.getElementById('progress-fill').style.width = '100%';
}
</script>
